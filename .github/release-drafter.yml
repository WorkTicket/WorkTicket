name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
categories:
  - title: '🚀 Features'
    labels:
      - 'enhancement'
  - title: '🐛 Bug Fixes'
    labels:
      - 'bug'
  - title: '🧰 Maintenance'
    labels:
      - 'dependencies'
      - 'ci'
      - 'ops'
  - title: '📖 Documentation'
    labels:
      - 'documentation'
change-template: '- $TITLE (#$NUMBER)'
change-title-escapes: '\<*_&'
version-resolver:
  major:
    labels:
      - 'breaking'
  minor:
    labels:
      - 'enhancement'
  patch:
    labels:
      - 'bug'
      - 'dependencies'
      - 'ci'
      - 'ops'
      - 'documentation'
  default: patch
template: |
  ## Changes

  $CHANGES

  **Full Changelog:** https://github.com/WorkTicket/workticket/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
