# Auditor Action audit policy configuration
# Used by auditor-action/action@v2 in the full-ci.yml security job
# https://github.com/auditware/auditor-action

auditors:
  nodejs:
    - id: npm-audit
      severity: critical
      production: true
  npm:
    - id: known-vulnerabilities
      severity: critical

ignore:
  # Add exceptions for known low-risk advisories here
  advisories: []
  paths: []
