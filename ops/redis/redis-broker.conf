port 6379
# Bind set to 0.0.0.0 for Docker networking (network isolation is handled by Docker networks)
bind 0.0.0.0
protected-mode yes
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command CONFIG ""
rename-command SHUTDOWN ""
rename-command DEBUG ""
rename-command SLAVEOF ""
rename-command REPLICAOF ""
rename-command SAVE ""
rename-command BGSAVE ""
rename-command BGREWRITEAOF ""
aclfile /etc/redis/users.acl
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
# noeviction is critical for a message broker: keys must never be evicted
# silently, as that would cause lost jobs and data corruption.
maxmemory 1gb
maxmemory-policy noeviction
