# Celery Worker HorizontalPodAutoscalers
# Queue-depth-based autoscaling via custom Prometheus metrics.
# Requires Prometheus Adapter configured with celery_queue_depth metric.
#
# Apply: kubectl apply -f ops/k8s/hpa-celery.yaml --namespace=workticket
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: celery-worker-text-hpa
  namespace: workticket
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: celery-worker-text
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Pods
      pods:
        metric:
          name: celery_queue_depth_ai_text
        target:
          type: AverageValue
          averageValue: "10"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
